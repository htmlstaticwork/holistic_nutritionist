<!DOCTYPE html>
<html lang="en" data-theme="light">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | AuraWellness Portal</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="assets/css/style.css">

    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <script>
        (function () {
            const theme = localStorage.getItem('theme') || 'light';
            const dir = localStorage.getItem('dir') || 'ltr';
            document.documentElement.setAttribute('data-theme', theme);
            document.documentElement.setAttribute('dir', dir);
        })();
    </script>
</head>

<body class="auth-page">
    <div class="container" style="max-width: 450px;">
        <div class="card glass shadow-lg login-card"
            style="padding: 3rem; text-align: center; border-radius: 2rem; background: var(--clr-surface);">
            <div class="flex-center mb-2">
                <a href="index.html" class="nav-logo">
                    <img src="assets/images/favicon.svg" alt="AuraWellness Logo"
                        style="width: 24px; height: 24px; vertical-align: middle;"> AuraWellness
                </a>
            </div>
            <h2 class="mb-1">Welcome Back</h2>
            <p class="mb-3" style="color: var(--clr-text-secondary); font-size: 0.9rem;">Sign in to access your healing
                portal and protocols.</p>

            <form action="#">
                <div class="form-group" style="text-align: left;">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" placeholder="your@email.com" required>
                </div>
                <div class="form-group" style="text-align: left;">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <label class="form-label">Password</label>
                        <a href="#" style="font-size: 0.75rem; color: var(--clr-primary); margin-bottom: 0.6rem;">Forgot
                            Password?</a>
                    </div>
                    <input type="password" class="form-control" placeholder="••••••••" required>
                </div>
                <div class="form-group"
                    style="text-align: left; display: flex; align-items: center; gap: 0.5rem; margin-top: -0.5rem; margin-bottom: 1.5rem;">
                    <input type="checkbox" id="remember" name="remember" style="width: auto; cursor: pointer;">
                    <label for="remember"
                        style="font-size: 0.85rem; color: var(--clr-text-secondary); cursor: pointer;">Remember
                        me</label>
                </div>

                <button type="submit" class="btn btn-primary"
                    style="width: 100%; padding: 1.2rem; margin-top: 1rem;">Sign In</button>
            </form>

            <div style="margin-top: 2.5rem; display: flex; align-items: center; justify-content: center; gap: 1rem;">
                <hr style="flex: 1; border: 0; border-top: 1px solid var(--clr-border);">
                <span style="font-size: 0.75rem; text-transform: uppercase; color: var(--clr-text-secondary);">OR</span>
                <hr style="flex: 1; border: 0; border-top: 1px solid var(--clr-border);">
            </div>

            <div style="display:flex; gap:1rem; margin-top: 1.5rem;">
                <button class="btn btn-outline" style="flex:1; padding: 0.8rem; font-size: 0.8rem;"><i
                        class="fab fa-google"></i> Google</button>
                <button class="btn btn-outline" style="flex:1; padding: 0.8rem; font-size: 0.8rem;"><i
                        class="fab fa-apple"></i> Apple</button>
            </div>

            <p style="margin-top: 2rem; font-size: 0.9rem; color: var(--clr-text-secondary);">Don't have an account? <a
                    href="signup.html" style="color: var(--clr-primary); font-weight: 700;">Join now.</a></p>
        </div>
    </div>

    <script src="assets/js/main.js"></script>
</body>

</html>
